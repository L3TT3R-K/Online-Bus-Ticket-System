<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quen mat khau - Bus Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
<section class="auth-page">
    <div class="container">
        <div class="auth-card">
            <div class="row g-0">
                <div class="col-lg-6 d-none d-lg-block">
                    <div class="auth-banner">
                        <div>
                            <h1>Dat lai mat khau</h1>
                            <p>Nhap email da dang ky de nhan link tao mat khau moi.</p>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="auth-form">
                        <a href="login.html" class="fw-bold"><i class="fa-solid fa-arrow-left"></i> Ve dang nhap</a>
                        <h2 class="mt-4">Quen mat khau</h2>
                        <p class="text-muted">He thong se gui link dat lai mat khau den email cua ban.</p>
                        <form id="forgotPasswordForm">
                            <div class="mb-4">
                                <label class="form-label">Email</label>
                                <input id="email" type="email" class="form-control" placeholder="email@gmail.com" required>
                            </div>
                            <button id="forgotPasswordBtn" type="submit" class="btn btn-orange w-100 py-2">Gui link</button>
                        </form>
                        <div id="authMessage"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<script src="assets/js/forgot-password.js"></script>
</body>
</html>
