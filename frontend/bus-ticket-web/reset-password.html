<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dat lai mat khau - Bus Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
<section class="auth-page">
    <div class="container">
        <div class="auth-card">
            <div class="row g-0">
                <div class="col-lg-6 d-none d-lg-block">
                    <div class="auth-banner">
                        <div>
                            <h1>Mat khau moi</h1>
                            <p>Tao mat khau moi cho tai khoan Bus Ticket cua ban.</p>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="auth-form">
                        <a href="login.html" class="fw-bold"><i class="fa-solid fa-arrow-left"></i> Ve dang nhap</a>
                        <h2 class="mt-4">Dat lai mat khau</h2>
                        <form id="resetPasswordForm">
                            <div class="mb-3">
                                <label class="form-label">Mat khau moi</label>
                                <input id="newPassword" type="password" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Xac nhan mat khau moi</label>
                                <input id="confirmNewPassword" type="password" class="form-control" required>
                            </div>
                            <button id="resetPasswordBtn" type="submit" class="btn btn-orange w-100 py-2">Cap nhat mat khau</button>
                        </form>
                        <div id="authMessage"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<script src="assets/js/reset-password.js"></script>
</body>
</html>
